services:
  excalidraw-room:
    image: excalidraw/excalidraw-room:latest
    container_name: excalidraw-room
    ports:
      - "3002:80"
    restart: unless-stopped
    environment:
      - PORT=80
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5

  excalidraw:
    build:
      context: .
      args:
        - NODE_ENV=${NODE_ENV:-production}
        - VITE_APP_PORT=${VITE_APP_PORT:-3000}
        - FAST_REFRESH=${FAST_REFRESH:-false}
        - VITE_APP_BACKEND_V2_GET_URL=${VITE_APP_BACKEND_V2_GET_URL}
        - VITE_APP_BACKEND_V2_POST_URL=${VITE_APP_BACKEND_V2_POST_URL}
        - VITE_APP_LIBRARY_URL=${VITE_APP_LIBRARY_URL}
        - VITE_APP_LIBRARY_BACKEND=${VITE_APP_LIBRARY_BACKEND}
        - VITE_APP_WS_SERVER_URL=${VITE_APP_WS_SERVER_URL}
        - VITE_APP_AI_BACKEND=${VITE_APP_AI_BACKEND}
        - VITE_APP_FIREBASE_CONFIG=${VITE_APP_FIREBASE_CONFIG}
        - VITE_APP_SUPABASE_URL=${VITE_APP_SUPABASE_URL}
        - VITE_APP_SUPABASE_ANON_KEY=${VITE_APP_SUPABASE_ANON_KEY}
        - VITE_APP_PLUS_LP=${VITE_APP_PLUS_LP}
        - VITE_APP_PLUS_APP=${VITE_APP_PLUS_APP}
        - VITE_APP_PLUS_EXPORT_PUBLIC_KEY=${VITE_APP_PLUS_EXPORT_PUBLIC_KEY}
        - VITE_APP_DISABLE_SENTRY=${VITE_APP_DISABLE_SENTRY:-true}
        - VITE_APP_ENABLE_TRACKING=${VITE_APP_ENABLE_TRACKING:-false}
        - VITE_APP_ENABLE_PWA=${VITE_APP_ENABLE_PWA:-true}
        - VITE_APP_ENABLE_ESLINT=${VITE_APP_ENABLE_ESLINT:-false}
        - VITE_APP_COLLAPSE_OVERLAY=${VITE_APP_COLLAPSE_OVERLAY:-true}
        - VITE_APP_DISABLE_PREVENT_UNLOAD=${VITE_APP_DISABLE_PREVENT_UNLOAD}
        - VITE_APP_DEV_DISABLE_LIVE_RELOAD=${VITE_APP_DEV_DISABLE_LIVE_RELOAD}
        - VITE_APP_DEBUG_ENABLE_TEXT_CONTAINER_BOUNDING_BOX=${VITE_APP_DEBUG_ENABLE_TEXT_CONTAINER_BOUNDING_BOX:-false}
        - VITE_APP_GIT_SHA=${VITE_APP_GIT_SHA}
    container_name: excalidraw
    ports:
      - "${VITE_APP_PORT:-3000}:80"
    restart: unless-stopped
    depends_on:
      excalidraw-room:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
